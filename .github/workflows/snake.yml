name: generate snake animation

on:
  schedule:
    - cron: '0 */24 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate snake svgs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Naifcx47350
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#E0322B&color_dots=#161214,#3a1715,#7a1714,#b3231e,#E0322B
            dist/github-snake-light.svg?color_snake=#C42820&color_dots=#efe9e2,#f3b9b4,#e07a74,#cf463d,#C42820

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
